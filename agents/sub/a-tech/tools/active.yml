# Swarm tools (send_message, list_members, my_tasks, task_get, task_propose,
# alarm_set/clear) + skill are injected by the worker role — do NOT list them.
- http_request  # GET /api/signals/today (candidates), /api/book?status=open (holdings to review), /api/prices, /api/features
- calc          # technical arithmetic (MA spreads, ATR, breakout %, support/resistance distances)
- repl          # quick numeric checks over a name's price/volume series
- bash          # ad-hoc execution; durable code & new APIs go through morgan → evva
- read          # docs/PRD tickets, teammates' memory dirs
- write         # native memory (active: unlocks the memory protocol)
- todo_write